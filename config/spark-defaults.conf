# =============================================================================
# config/spark-defaults.conf — TaaSim
# Mount path (docker-compose): /opt/spark/conf/spark-defaults.conf  (read-only)
# =============================================================================
# WHY THIS FILE EXISTS:
#   AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY env vars are picked up by Hadoop's
#   DefaultAWSCredentialsProviderChain for the key and secret.
#   But fs.s3a.endpoint and fs.s3a.path.style.access CANNOT be set via env vars
#   — they must be declared here in spark-defaults.conf.
# =============================================================================

# ── S3A / MinIO ───────────────────────────────────────────────────────────────
spark.hadoop.fs.s3a.endpoint                    http://minio:9000
spark.hadoop.fs.s3a.path.style.access           true
spark.hadoop.fs.s3a.impl                        org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.aws.credentials.provider    org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider
spark.hadoop.fs.s3a.connection.ssl.enabled      false

# ── Performance (dev workstation — avoids 200-partition default) ───────────────
spark.sql.shuffle.partitions                    8
spark.default.parallelism                       8

# ── Serialization ─────────────────────────────────────────────────────────────
spark.serializer                                org.apache.spark.serializer.KryoSerializer

# ── Cluster ───────────────────────────────────────────────────────────────────
spark.master                                    spark://spark-master:7077

# ── Cassandra connector (uncomment in Sprint 4 for KPI writes) ────────────────
# spark.cassandra.connection.host               cassandra
# spark.cassandra.connection.port               9042
