networks:
  taasim:
    driver: bridge

volumes:
  kafka_data:
  minio_data:
  cassandra_data:
  flink_checkpoints:
  grafana_data:
  s3a_jars:

# Common S3A / MinIO environment variables
x-s3a-env: &s3a-env
  AWS_ACCESS_KEY_ID: minioadmin
  AWS_SECRET_ACCESS_KEY: minioadmin
  AWS_ENDPOINT_URL: http://minio:9000
  AWS_REGION: us-east-1
  AWS_DEFAULT_REGION: us-east-1

services:
  # ---------------------------------------------------------------------------
  # 1. KAFKA (KRaft mode)
  # ---------------------------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: taasim-kafka
    hostname: kafka
    networks:
      - taasim
    ports:
      - "9092:9092"
    environment:
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:29093"
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10

  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    container_name: taasim-kafka-init
    networks:
      - taasim
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -e
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic raw.gps --partitions 4 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic processed.gps --partitions 4 --replication-factor 1
        echo '--- Kafka Topics Created ---'
    restart: on-failure
    # ---------------------------------------------------------------------------
# 1b. KAFKA UI — Web UI for browsing topics/messages
# ---------------------------------------------------------------------------
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: taasim-kafka-ui
    hostname: kafka-ui
    networks:
      - taasim
    ports:
      - "8083:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: taasim
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # 2. STORAGE (MinIO & JAR Bootstrap)
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: taasim-minio
    networks:
      - taasim
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s

  s3a-jars:
    image: curlimages/curl:8.7.1
    container_name: taasim-s3a-jars
    user: "0:0"
    networks:
      - taasim
    volumes:
      - s3a_jars:/jars
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        # Kafka Connector
        if [ ! -s "/jars/flink-sql-connector-kafka-3.1.0-1.18.jar" ]; then
          curl -fLSL --retry 3 -o "/jars/flink-sql-connector-kafka-3.1.0-1.18.jar" "https://repo1.maven.org/maven2/org/apache/flink/flink-sql-connector-kafka/3.1.0-1.18/flink-sql-connector-kafka-3.1.0-1.18.jar"
        fi
        # Cassandra Connector
        if [ ! -s "/jars/flink-connector-cassandra_2.12-3.2.0-1.18.jar" ]; then
          curl -fLSL --retry 3 -o "/jars/flink-connector-cassandra_2.12-3.2.0-1.18.jar" "https://repo1.maven.org/maven2/org/apache/flink/flink-connector-cassandra_2.12/3.2.0-1.18/flink-connector-cassandra_2.12-3.2.0-1.18.jar"
        fi
        # Hadoop/S3 Jars
        if [ ! -s "/jars/hadoop-aws-3.3.4.jar" ]; then
          curl -fLSL -o "/jars/hadoop-aws-3.3.4.jar" "https://repo1.maven.org/maven2/org/apache/hadoop/hadoop-aws/3.3.4/hadoop-aws-3.3.4.jar"
        fi
        if [ ! -s "/jars/aws-java-sdk-bundle-1.12.262.jar" ]; then
          curl -fLSL -o "/jars/aws-java-sdk-bundle-1.12.262.jar" "https://repo1.maven.org/maven2/com/amazonaws/aws-java-sdk-bundle/1.12.262/aws-java-sdk-bundle-1.12.262.jar"
        fi
        mkdir -p /jars/s3-fs-hadoop
        cp -f "/jars/hadoop-aws-3.3.4.jar" /jars/s3-fs-hadoop/
        cp -f "/jars/aws-java-sdk-bundle-1.12.262.jar" /jars/s3-fs-hadoop/
        chmod -R a+rX /jars
        echo "--- All JARs Downloaded Successfully ---"
    restart: on-failure

  # ---------------------------------------------------------------------------
  # 3. DATABASE (Cassandra)
  # ---------------------------------------------------------------------------
  cassandra:
    image: cassandra:4.1
    container_name: taasim-cassandra
    networks:
      - taasim
    ports:
      - "9042:9042"
    environment:
      MAX_HEAP_SIZE: 1G
      HEAP_NEWSIZE: 256M
    volumes:
      - cassandra_data:/var/lib/cassandra
    depends_on:
      s3a-jars:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe keyspaces' > /dev/null 2>&1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s

  cassandra-init:
    image: cassandra:4.1
    container_name: taasim-cassandra-init
    networks:
      - taasim
    depends_on:
      cassandra:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -e
        until cqlsh cassandra 9042 -e "describe cluster" > /dev/null 2>&1; do
          echo "Waiting for Cassandra..."
          sleep 5
        done
        cqlsh cassandra 9042 <<'CQL'
        CREATE KEYSPACE IF NOT EXISTS taasim WITH replication = {'class': 'SimpleStrategy', 'replication_factor': 1};
        CREATE TABLE IF NOT EXISTS taasim.vehicle_positions (
            city text, zone_id int, event_time timestamp, taxi_id text, 
            lat double, lon double, speed float, status text,
            PRIMARY KEY ((city, zone_id), event_time)
        ) WITH CLUSTERING ORDER BY (event_time DESC);
        CQL
        echo "--- Cassandra Tables Created ---"
    restart: on-failure

  # ---------------------------------------------------------------------------
  # 4. STREAMING (Flink)
  # ---------------------------------------------------------------------------
  flink-jobmanager:
    image: flink:1.18.1-scala_2.12-java11
    container_name: taasim-flink-jm
    networks:
      - taasim
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      <<: *s3a-env
      ENABLE_BUILTIN_PLUGINS: flink-s3-fs-hadoop-1.18.1.jar
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        s3.endpoint: http://minio:9000
        s3.path.style.access: true
        s3.access-key: minioadmin
        s3.secret-key: minioadmin
        s3.connection.ssl.enabled: false
    volumes:
      - flink_checkpoints:/tmp/flink-checkpoints
      - s3a_jars:/opt/flink/plugins
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/overview > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    depends_on:
      s3a-jars:
        condition: service_completed_successfully
      minio:
        condition: service_healthy

  flink-taskmanager:
    image: flink:1.18.1-scala_2.12-java11
    container_name: taasim-flink-tm
    networks:
      - taasim
    command: taskmanager
    environment:
      <<: *s3a-env
      ENABLE_BUILTIN_PLUGINS: flink-s3-fs-hadoop-1.18.1.jar
    volumes:
      - s3a_jars:/opt/flink/plugins
    depends_on:
      flink-jobmanager:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # 5. BATCH & NOTEBOOKS (Spark & Jupyter)
  # ---------------------------------------------------------------------------
  spark-master:
    image: quay.io/jupyter/pyspark-notebook:spark-3.5.0
    container_name: taasim-spark-master
    networks:
      - taasim
    ports:
      - "8080:8080"
      - "7077:7077"
    entrypoint: ["/usr/local/spark/bin/spark-class"]
    command: ["org.apache.spark.deploy.master.Master", "--host", "spark-master", "--webui-port", "8080"]
    volumes:
      - s3a_jars:/opt/extra-jars:ro
      - ./conf/spark-defaults.conf:/usr/local/spark/conf/spark-defaults.conf:ro
    healthcheck:
      test:
        - "CMD-SHELL"
        - >-
          python -c "import socket,urllib.request; urllib.request.urlopen('http://spark-master:8080',timeout=2).read(1); socket.create_connection(('spark-master',7077),timeout=2).close()"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 25s
    depends_on:
      s3a-jars:
        condition: service_completed_successfully
      minio:
        condition: service_healthy

  spark-worker:
    image: quay.io/jupyter/pyspark-notebook:spark-3.5.0
    container_name: taasim-spark-worker
    networks:
      - taasim
    ports:
      - "8082:8082"
    environment:
      SPARK_WORKER_DIR: /tmp/spark-work
    entrypoint: ["/usr/local/spark/bin/spark-class"]
    command: ["org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077", "--webui-port", "8082"]
    volumes:
      - s3a_jars:/opt/extra-jars:ro
      - ./conf/spark-defaults.conf:/usr/local/spark/conf/spark-defaults.conf:ro
    healthcheck:
      test:
        - "CMD-SHELL"
        - >-
          python -c "import urllib.request; urllib.request.urlopen('http://spark-worker:8082',timeout=2).read(1)"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 25s
    depends_on:
      spark-master:
        condition: service_healthy
      s3a-jars:
        condition: service_completed_successfully

  jupyter:
    image: quay.io/jupyter/pyspark-notebook:spark-3.5.0
    container_name: taasim-jupyter
    networks:
      - taasim
    ports:
      - "8888:8888"
    environment:
      SPARK_MASTER: spark://spark-master:7077
      JUPYTER_TOKEN: taasim
    volumes:
      - s3a_jars:/opt/extra-jars:ro
      - ./conf/spark-defaults.conf:/usr/local/spark/conf/spark-defaults.conf:ro
    depends_on:
      spark-master:
        condition: service_healthy
      s3a-jars:
        condition: service_completed_successfully

  # ---------------------------------------------------------------------------
  # 6. MONITORING (Grafana)
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:10.4.2
    container_name: taasim-grafana
    networks:
      - taasim
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: hadesarchitect-cassandra-datasource
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      cassandra:
        condition: service_healthy