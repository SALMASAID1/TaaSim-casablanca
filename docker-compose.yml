networks:
  taasim:
    driver: bridge

volumes:
  kafka_data:
  kafka_connect_plugins:
  minio_data:
  cassandra_data:
  flink_checkpoints:
  grafana_data:
  s3a_jars:

# ---------------------------------------------------------------------------
# Common S3A / MinIO environment — injected into Flink
# NOTE: Spark uses spark-defaults.conf mount instead (apache/spark requirement)
# ---------------------------------------------------------------------------
x-s3a-env: &s3a-env
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minioadmin}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
  AWS_ENDPOINT_URL: ${AWS_ENDPOINT_URL_DOCKER:-http://minio:9000}
  AWS_REGION: ${AWS_REGION:-us-east-1}
  AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}

# ---------------------------------------------------------------------------
# 1. KAFKA — KRaft mode (no Zookeeper)
# ---------------------------------------------------------------------------
services:
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: taasim-kafka
    hostname: kafka
    networks:
      - taasim
    ports:
      - "9092:9092"
      - "9101:9101"
    environment:
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:29093"
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      # Must be a valid KRaft UUID (base64) — generate via `kafka-storage random-uuid`
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s


  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    container_name: taasim-kafka-init
    networks:
      - taasim
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./infra/kafka/kafka-init.sh:/init/kafka-init.sh:ro
    entrypoint: ["/bin/bash", "/init/kafka-init.sh"]
    restart: on-failure

# ---------------------------------------------------------------------------
# 1b. KAFKA UI — Web UI for browsing topics/messages
# ---------------------------------------------------------------------------
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: taasim-kafka-ui
    hostname: kafka-ui
    networks:
      - taasim
    ports:
      - "8083:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: taasim
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy

# ---------------------------------------------------------------------------
# 1c. KAFKA CONNECT — Archive raw topics to MinIO (S3 sink)
# ---------------------------------------------------------------------------
  kafka-connect:
    image: confluentinc/cp-kafka-connect:7.6.1
    container_name: taasim-kafka-connect
    hostname: kafka-connect
    networks:
      - taasim
    ports:
      - "8084:8083" # Connect REST (host)
    environment:
      <<: *s3a-env
      CONNECT_S3_VERSION: ${CONNECT_S3_VERSION:-10.5.0}
      CONNECT_BOOTSTRAP_SERVERS: kafka:29092
      CONNECT_REST_PORT: 8083
      CONNECT_REST_ADVERTISED_HOST_NAME: kafka-connect
      CONNECT_GROUP_ID: taasim-connect

      CONNECT_CONFIG_STORAGE_TOPIC: connect-configs
      CONNECT_OFFSET_STORAGE_TOPIC: connect-offsets
      CONNECT_STATUS_STORAGE_TOPIC: connect-status
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1

      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.storage.StringConverter
      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_INTERNAL_KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_INTERNAL_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_INTERNAL_KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_INTERNAL_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"

      CONNECT_PLUGIN_PATH: /usr/share/java,/usr/share/confluent-hub-components
      CONNECT_CONFIG_PROVIDERS: env
      CONNECT_CONFIG_PROVIDERS_ENV_CLASS: org.apache.kafka.common.config.provider.EnvVarConfigProvider
      CONNECT_LOG4J_ROOT_LOGLEVEL: INFO
    volumes:
      - kafka_connect_plugins:/usr/share/confluent-hub-components
      - ./infra/kafka-connect/connect-entrypoint.sh:/init/connect-entrypoint.sh:ro
    entrypoint: ["/bin/bash", "/init/connect-entrypoint.sh"]
    depends_on:
      kafka:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  kafka-connect-init:
    image: curlimages/curl:8.7.1
    container_name: taasim-kafka-connect-init
    networks:
      - taasim
    environment:
      CONNECT_URL: http://kafka-connect:8083
    volumes:
      - ./infra/kafka-connect/register-connectors.sh:/init/register-connectors.sh:ro
      - ./infra/kafka-connect/connectors:/connectors:ro
    depends_on:
      kafka-connect:
        condition: service_started
    entrypoint: ["/bin/sh", "/init/register-connectors.sh"]
    restart: on-failure

# ---------------------------------------------------------------------------
# 2. MINIO — S3-compatible object store
# ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: taasim-minio
    hostname: minio
    networks:
      - taasim
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  minio-init:
    image: minio/mc:latest
    container_name: taasim-minio-init
    networks:
      - taasim
    environment:
      MINIO_HOST: http://minio:9000
      MINIO_BUCKET: taasim
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - ./raw:/seed/raw:ro
      - ./metadata:/seed/metadata:ro
      - ./infra/minio/minio-init.sh:/init/minio-init.sh:ro
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh","/init/minio-init.sh"]
    restart: on-failure

# ---------------------------------------------------------------------------
# 2b. S3A JAR bootstrap (Spark + Flink)
#
# Downloads Hadoop S3A dependencies once into a named volume, then both Spark
# and Flink mount them.
# ---------------------------------------------------------------------------
  s3a-jars:
    image: curlimages/curl:8.7.1
    container_name: taasim-s3a-jars
    user: "0:0"
    networks:
      - taasim
    volumes:
      - s3a_jars:/jars
      - ./infra/s3a-jars/s3a-jars-init.sh:/init/s3a-jars-init.sh:ro
    entrypoint: ["/bin/sh", "/init/s3a-jars-init.sh"]
    restart: on-failure
# ---------------------------------------------------------------------------
# 3. CASSANDRA
# ---------------------------------------------------------------------------
  cassandra:
    image: cassandra:4.1
    container_name: taasim-cassandra
    hostname: cassandra
    networks:
      - taasim
    ports:
      - "9042:9042"
    environment:
      MAX_HEAP_SIZE: 1G
      HEAP_NEWSIZE: 256M
      CASSANDRA_CLUSTER_NAME: TaaSim
      CASSANDRA_DC: dc1
      CASSANDRA_RACK: rack1
    volumes:
      - cassandra_data:/var/lib/cassandra

    depends_on:
      s3a-jars:
          condition: service_completed_successfully

    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe keyspaces' > /dev/null 2>&1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s

  cassandra-init:
    image: cassandra:4.1
    container_name: taasim-cassandra-init
    networks:
      - taasim
    depends_on:
      cassandra:
        condition: service_healthy
    volumes:
      - ./infra/cassandra/cassandra-init.sh:/init/cassandra-init.sh:ro
      - ./db/cassandra_init.cql:/init/cassandra_init.cql:ro
    entrypoint: ["/bin/bash", "/init/cassandra-init.sh"]
    restart: on-failure

# ---------------------------------------------------------------------------
# 4. APACHE FLINK — 1 JobManager + 1 TaskManager
# ---------------------------------------------------------------------------
  flink-jobmanager:
    image: flink:1.18.1-scala_2.12-java11
    container_name: taasim-flink-jm
    hostname: flink-jobmanager
    networks:
      - taasim
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      <<: *s3a-env
      ENABLE_BUILT_IN_PLUGINS: flink-s3-fs-hadoop-1.18.1.jar
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        jobmanager.memory.process.size: 1600m
        state.checkpoints.dir: s3a://taasim/raw/kafka-archive/flink-checkpoints/
        state.savepoints.dir: s3a://taasim/raw/kafka-archive/flink-savepoints/
        execution.checkpointing.interval: 60000
        execution.checkpointing.mode: AT_LEAST_ONCE
        s3.endpoint: ${AWS_ENDPOINT_URL_DOCKER:-http://minio:9000}
        s3.path.style.access: true
        s3.access-key: ${AWS_ACCESS_KEY_ID:-minioadmin}
        s3.secret-key: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
        s3.connection.ssl.enabled: false
    volumes:
      - flink_checkpoints:/tmp/flink-checkpoints
      - s3a_jars:/opt/flink/plugins
    depends_on:
      s3a-jars:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/overview > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  flink-taskmanager:
    image: flink:1.18.1-scala_2.12-java11
    container_name: taasim-flink-tm
    hostname: flink-taskmanager
    networks:
      - taasim
    command: taskmanager
    depends_on:
      flink-jobmanager:
        condition: service_healthy
    environment:
      <<: *s3a-env
      ENABLE_BUILT_IN_PLUGINS: flink-s3-fs-hadoop-1.18.1.jar
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.memory.process.size: 1728m
        taskmanager.numberOfTaskSlots: 4
        state.checkpoints.dir: s3a://taasim/raw/kafka-archive/flink-checkpoints/
        s3.endpoint: ${AWS_ENDPOINT_URL_DOCKER:-http://minio:9000}
        s3.path.style.access: true
        s3.access-key: ${AWS_ACCESS_KEY_ID:-minioadmin}
        s3.secret-key: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
        s3.connection.ssl.enabled: false
    volumes:
      - s3a_jars:/opt/flink/plugins

# ---------------------------------------------------------------------------
# 5. APACHE SPARK — Master + 1 Worker  (apache/spark:3.5.0 — official image)
#
#  Key differences vs bitnami:
#  - Entrypoint is /opt/entrypoint.sh; role is passed as argument (master/worker)
#  - NO SPARK_MODE / SPARK_CONF_* env vars — those are Bitnami-only
#  - S3A config lives in conf/spark-defaults.conf, mounted read-only
#  - Worker UI on 8082 (avoids clash with Flink on 8081)
# ---------------------------------------------------------------------------
  spark-master:
    image: quay.io/jupyter/pyspark-notebook:spark-3.5.0
    container_name: taasim-spark-master
    hostname: spark-master
    networks:
      - taasim
    ports:
      - "8080:8080"   # Master Web UI
      - "7077:7077"   # Master RPC
    depends_on:
      s3a-jars:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
    entrypoint: ["/usr/local/spark/bin/spark-class"]
    command:
      - org.apache.spark.deploy.master.Master
      - --host
      - spark-master
      - --port
      - "7077"
      - --webui-port
      - "8080"
    environment:
      <<: *s3a-env
      SPARK_MASTER_HOST: spark-master
      SPARK_MASTER_PORT: "7077"
      SPARK_MASTER_WEBUI_PORT: "8080"
      PYSPARK_PYTHON: python3
    volumes:
      - ./conf/spark-defaults.conf:/usr/local/spark/conf/spark-defaults.conf:ro
      - s3a_jars:/opt/extra-jars:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080 > /dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  spark-worker:
    image: quay.io/jupyter/pyspark-notebook:spark-3.5.0
    container_name: taasim-spark-worker
    hostname: spark-worker
    networks:
      - taasim
    ports:
      - "8082:8082"
    environment:
      <<: *s3a-env
      SPARK_WORKER_DIR: /tmp/spark-work
      SPARK_WORKER_CORES: "2"
      SPARK_WORKER_MEMORY: "2g"
      SPARK_WORKER_WEBUI_PORT: "8082"
      PYSPARK_PYTHON: python3
    
    entrypoint: ["/usr/local/spark/bin/spark-class"]
    command: ["org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077", "--webui-port", "8082"]
    volumes:
      - s3a_jars:/opt/extra-jars:ro
      - ./conf/spark-defaults.conf:/usr/local/spark/conf/spark-defaults.conf:ro
    healthcheck:
      test:
        - "CMD-SHELL"
        - >-
          python -c "import urllib.request; urllib.request.urlopen('http://spark-worker:8082',timeout=2).read(1)"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 25s
    depends_on:
      spark-master:
        condition: service_healthy
      s3a-jars:
        condition: service_completed_successfully
    # healthcheck:
    #   test: ["CMD-SHELL", "curl -sf http://localhost:8082 > /dev/null"]
    #   interval: 15s
    #   timeout: 5s
    #   retries: 10
    #   start_period: 30s

# ---------------------------------------------------------------------------
# 5b. JUPYTER — PySpark notebooks (driver) connected to Spark master
# ---------------------------------------------------------------------------
  jupyter:
    build:
      context: ./infra/spark/jupyter
      dockerfile: Dockerfile
    image: quay.io/jupyter/pyspark-notebook:spark-3.5.0
    container_name: taasim-jupyter
    hostname: jupyter
    networks:
      - taasim
    ports:
      - "8888:8888"
    environment:
      <<: *s3a-env
      SPARK_MASTER: spark://spark-master:7077
      PYSPARK_SUBMIT_ARGS: "--master spark://spark-master:7077 pyspark-shell"
      SPARK_CONF_DIR: /opt/spark-conf
      JUPYTER_TOKEN: taasim
    volumes:
      - ./notebooks/notebook-spark:/home/jovyan/work
      - ./docs/:/home/jovyan/data
      - ./conf/spark-defaults.conf:/opt/spark-conf/spark-defaults.conf:ro
      - s3a_jars:/opt/extra-jars:ro
      - ./conf/spark-defaults.conf:/usr/local/spark/conf/spark-defaults.conf:ro
    depends_on:
      spark-master:
        condition: service_healthy
      s3a-jars:
        condition: service_completed_successfully
      minio:
        condition: service_healthy

# ---------------------------------------------------------------------------
# 6. GRAFANA
# ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:10.4.2
    container_name: taasim-grafana
    hostname: grafana
    networks:
      - taasim
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER:  ${GF_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: hadesarchitect-cassandra-datasource
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      cassandra:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health > /dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s