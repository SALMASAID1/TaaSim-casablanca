networks:
  taasim:
    driver: bridge

volumes:
  kafka_data:
  minio_data:
  cassandra_data:
  flink_checkpoints:
  grafana_data:
  s3a_jars:

# ---------------------------------------------------------------------------
# Common S3A / MinIO environment — injected into Flink
# NOTE: Spark uses spark-defaults.conf mount instead (apache/spark requirement)
# ---------------------------------------------------------------------------
x-s3a-env: &s3a-env
  AWS_ACCESS_KEY_ID: minioadmin
  AWS_SECRET_ACCESS_KEY: minioadmin
  AWS_ENDPOINT_URL: http://minio:9000
  AWS_REGION: us-east-1
  AWS_DEFAULT_REGION: us-east-1

# ---------------------------------------------------------------------------
# 1. KAFKA — KRaft mode (no Zookeeper)
# ---------------------------------------------------------------------------
services:
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: taasim-kafka
    hostname: kafka
    networks:
      - taasim
    ports:
      - "9092:9092"
      - "9101:9101"
    environment:
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:29093"
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      # Must be a valid KRaft UUID (base64) — generate via `kafka-storage random-uuid`
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    container_name: taasim-kafka-init
    networks:
      - taasim
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -e
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic raw.gps           --partitions 4 --replication-factor 1 --config retention.ms=604800000
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic raw.trips         --partitions 4 --replication-factor 1 --config retention.ms=604800000
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic processed.demand  --partitions 2 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic processed.gps     --partitions 4 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic processed.matches --partitions 2 --replication-factor 1
        echo '--- Topics created ---'
        kafka-topics --bootstrap-server kafka:29092 --list
    restart: on-failure

# ---------------------------------------------------------------------------
# 1b. KAFKA UI — Web UI for browsing topics/messages
# ---------------------------------------------------------------------------
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: taasim-kafka-ui
    hostname: kafka-ui
    networks:
      - taasim
    ports:
      - "8083:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: taasim
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy

# ---------------------------------------------------------------------------
# 2. MINIO — S3-compatible object store
# ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: taasim-minio
    hostname: minio
    networks:
      - taasim
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  minio-init:
    image: minio/mc:latest
    container_name: taasim-minio-init
    networks:
      - taasim
    volumes:
      - ./raw:/seed/raw:ro
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        mc alias set local http://minio:9000 minioadmin minioadmin
        mc mb --ignore-existing local/taasim

        # Bucket layout: one bucket (taasim) with four-zone prefixes
        echo 'ok' | mc pipe local/taasim/raw/porto-trips/.keep
        echo 'ok' | mc pipe local/taasim/raw/nyc-tlc/.keep
        echo 'ok' | mc pipe local/taasim/raw/kafka-archive/.keep
        echo 'ok' | mc pipe local/taasim/raw/kafka-archive/flink-checkpoints/.keep
        echo 'ok' | mc pipe local/taasim/raw/kafka-archive/flink-savepoints/.keep

        echo 'ok' | mc pipe local/taasim/curated/trips/.keep
        echo 'ok' | mc pipe local/taasim/curated/demand-by-zone/.keep

        echo 'ok' | mc pipe local/taasim/ml/features/.keep
        echo 'ok' | mc pipe local/taasim/ml/models/demand_v1/.keep

        # -------------------------------------------------------------------
        # Optional: seed MinIO from local workspace datasets (mounted read-only)
        # This avoids re-uploading after every `docker compose up`.
        # It only copies if a representative file is missing in the bucket.
        # -------------------------------------------------------------------
        if [ -f /seed/raw/porto-trips/train.csv ]; then
          if ! mc stat local/taasim/raw/porto-trips/train.csv >/dev/null 2>&1; then
            echo '--- Seeding Porto dataset into MinIO (raw/porto-trips) ---'
            mc cp /seed/raw/porto-trips/train.csv local/taasim/raw/porto-trips/train.csv
            [ -f /seed/raw/porto-trips/test.csv ] && mc cp /seed/raw/porto-trips/test.csv local/taasim/raw/porto-trips/test.csv || true
            [ -f /seed/raw/porto-trips/sampleSubmission.csv ] && mc cp /seed/raw/porto-trips/sampleSubmission.csv local/taasim/raw/porto-trips/sampleSubmission.csv || true
            [ -f /seed/raw/porto-trips/evaluation_script.r ] && mc cp /seed/raw/porto-trips/evaluation_script.r local/taasim/raw/porto-trips/evaluation_script.r || true
            if [ -d /seed/raw/porto-trips/metaData_taxistandsID_name_GPSlocation.csv ]; then
              mc mirror /seed/raw/porto-trips/metaData_taxistandsID_name_GPSlocation.csv local/taasim/raw/porto-trips/metaData_taxistandsID_name_GPSlocation.csv || true
            fi
          else
            echo '--- Porto dataset already present in MinIO ---'
          fi
        else
          echo '--- No local Porto dataset found at ./raw/porto-trips/train.csv; skipping seed ---'
        fi

        if [ -f /seed/raw/nyc-tlc/yellow_tripdata_2019-01.parquet ]; then
          if ! mc stat local/taasim/raw/nyc-tlc/yellow_tripdata_2019-01.parquet >/dev/null 2>&1; then
            echo '--- Seeding NYC TLC dataset into MinIO (raw/nyc-tlc) ---'
            for f in /seed/raw/nyc-tlc/*.parquet; do
              [ -f "$$f" ] || continue
              base=$$(basename "$$f")
              mc cp "$$f" "local/taasim/raw/nyc-tlc/$$base" || true
            done
          else
            echo '--- NYC TLC dataset already present in MinIO ---'
          fi
        else
          echo '--- No local NYC TLC dataset found at ./raw/nyc-tlc/*.parquet; skipping seed ---'
        fi

        echo '--- MinIO bucket + prefixes ready ---'
        mc ls local/taasim --recursive
    restart: on-failure

# ---------------------------------------------------------------------------
# 2b. S3A JAR bootstrap (Spark + Flink)
#
# Downloads Hadoop S3A dependencies once into a named volume, then both Spark
# and Flink mount them.
# ---------------------------------------------------------------------------
  s3a-jars:
    image: curlimages/curl:8.7.1
    container_name: taasim-s3a-jars
    user: "0:0"
    networks:
      - taasim
    volumes:
      - s3a_jars:/jars
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        if [ ! -s "/jars/hadoop-aws-3.3.4.jar" ]; then
          echo "Downloading hadoop-aws-3.3.4.jar"
          curl -fL --retry 5 --retry-delay 2 \
            -o "/jars/hadoop-aws-3.3.4.jar" \
            "https://repo1.maven.org/maven2/org/apache/hadoop/hadoop-aws/3.3.4/hadoop-aws-3.3.4.jar"
        fi

        if [ ! -s "/jars/aws-java-sdk-bundle-1.12.262.jar" ]; then
          echo "Downloading aws-java-sdk-bundle-1.12.262.jar"
          curl -fL --retry 5 --retry-delay 2 \
            -o "/jars/aws-java-sdk-bundle-1.12.262.jar" \
            "https://repo1.maven.org/maven2/com/amazonaws/aws-java-sdk-bundle/1.12.262/aws-java-sdk-bundle-1.12.262.jar"
        fi

        mkdir -p /jars/s3-fs-hadoop
        cp -f "/jars/hadoop-aws-3.3.4.jar" /jars/s3-fs-hadoop/
        cp -f "/jars/aws-java-sdk-bundle-1.12.262.jar" /jars/s3-fs-hadoop/
        chmod -R a+rX /jars
        echo "--- S3A jars ready ---"
        ls -1 /jars | sed -n '1,50p'
    restart: on-failure

# ---------------------------------------------------------------------------
# 3. CASSANDRA
# ---------------------------------------------------------------------------
  cassandra:
    image: cassandra:4.1
    container_name: taasim-cassandra
    hostname: cassandra
    networks:
      - taasim
    ports:
      - "9042:9042"
    environment:
      MAX_HEAP_SIZE: 512M
      HEAP_NEWSIZE: 128M
      CASSANDRA_CLUSTER_NAME: TaaSim
      CASSANDRA_DC: dc1
      CASSANDRA_RACK: rack1
    volumes:
      - cassandra_data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe keyspaces' > /dev/null 2>&1"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 60s

  cassandra-init:
    image: cassandra:4.1
    container_name: taasim-cassandra-init
    networks:
      - taasim
    depends_on:
      cassandra:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -e
        cqlsh cassandra 9042 <<'CQL'
        CREATE KEYSPACE IF NOT EXISTS taasim
          WITH replication = {'class': 'SimpleStrategy', 'replication_factor': 1};

        CREATE TABLE IF NOT EXISTS taasim.vehicle_positions (
          city        text,
          zone_id     int,
          event_time  timestamp,
          taxi_id     text,
          lat         double,
          lon         double,
          speed       float,
          status      text,
          PRIMARY KEY ((city, zone_id), event_time)
        ) WITH CLUSTERING ORDER BY (event_time DESC)
          AND default_time_to_live = 3600;

        CREATE TABLE IF NOT EXISTS taasim.trips (
          city         text,
          date_bucket  date,
          created_at   timestamp,
          trip_id      uuid,
          rider_id     text,
          taxi_id      text,
          origin_zone  int,
          dest_zone    int,
          status       text,
          fare         decimal,
          eta_seconds  int,
          PRIMARY KEY ((city, date_bucket), created_at)
        ) WITH CLUSTERING ORDER BY (created_at DESC);

        CREATE TABLE IF NOT EXISTS taasim.demand_zones (
          city               text,
          zone_id            int,
          window_start       timestamp,
          active_vehicles    int,
          pending_requests   int,
          ratio              float,
          forecast_demand    float,
          PRIMARY KEY ((city, zone_id), window_start)
        ) WITH CLUSTERING ORDER BY (window_start DESC)
          AND default_time_to_live = 86400;
        CQL
        echo '--- Cassandra schema applied ---'
    restart: on-failure

# ---------------------------------------------------------------------------
# 4. APACHE FLINK — 1 JobManager + 1 TaskManager
# ---------------------------------------------------------------------------
  flink-jobmanager:
    image: flink:1.18.1-scala_2.12-java11
    container_name: taasim-flink-jm
    hostname: flink-jobmanager
    networks:
      - taasim
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      <<: *s3a-env
      ENABLE_BUILTIN_PLUGINS: flink-s3-fs-hadoop-1.18.1.jar
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        jobmanager.memory.process.size: 1600m
        state.checkpoints.dir: s3a://taasim/raw/kafka-archive/flink-checkpoints/
        state.savepoints.dir: s3a://taasim/raw/kafka-archive/flink-savepoints/
        execution.checkpointing.interval: 60000
        execution.checkpointing.mode: AT_LEAST_ONCE
        s3.endpoint: http://minio:9000
        s3.path.style.access: true
        s3.access-key: minioadmin
        s3.secret-key: minioadmin
        s3.connection.ssl.enabled: false
    volumes:
      - flink_checkpoints:/tmp/flink-checkpoints
      - s3a_jars:/opt/flink/plugins
    depends_on:
      s3a-jars:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/overview > /dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  flink-taskmanager:
    image: flink:1.18.1-scala_2.12-java11
    container_name: taasim-flink-tm
    hostname: flink-taskmanager
    networks:
      - taasim
    command: taskmanager
    depends_on:
      flink-jobmanager:
        condition: service_healthy
    environment:
      <<: *s3a-env
      ENABLE_BUILTIN_PLUGINS: flink-s3-fs-hadoop-1.18.1.jar
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.memory.process.size: 1728m
        taskmanager.numberOfTaskSlots: 4
        state.checkpoints.dir: s3a://taasim/raw/kafka-archive/flink-checkpoints/
        s3.endpoint: http://minio:9000
        s3.path.style.access: true
        s3.access-key: minioadmin
        s3.secret-key: minioadmin
        s3.connection.ssl.enabled: false
    volumes:
      - s3a_jars:/opt/flink/plugins

# ---------------------------------------------------------------------------
# 5. APACHE SPARK — Master + 1 Worker  (apache/spark:3.5.0 — official image)
#
#  Key differences vs bitnami:
#  - Entrypoint is /opt/entrypoint.sh; role is passed as argument (master/worker)
#  - NO SPARK_MODE / SPARK_CONF_* env vars — those are Bitnami-only
#  - S3A config lives in conf/spark-defaults.conf, mounted read-only
#  - Worker UI on 8082 (avoids clash with Flink on 8081)
# ---------------------------------------------------------------------------
  spark-master:
    image: quay.io/jupyter/pyspark-notebook:spark-3.5.0
    container_name: taasim-spark-master
    hostname: spark-master
    networks:
      - taasim
    ports:
      - "8080:8080"   # Master Web UI
      - "7077:7077"   # Master RPC
    depends_on:
      s3a-jars:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
    entrypoint: ["/usr/local/spark/bin/spark-class"]
    command:
      - org.apache.spark.deploy.master.Master
      - --host
      - spark-master
      - --port
      - "7077"
      - --webui-port
      - "8080"
    environment:
      SPARK_MASTER_HOST: spark-master
      SPARK_MASTER_PORT: "7077"
      SPARK_MASTER_WEBUI_PORT: "8080"
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      PYSPARK_PYTHON: python3
    volumes:
      - ./conf/spark-defaults.conf:/usr/local/spark/conf/spark-defaults.conf:ro
      - s3a_jars:/opt/extra-jars:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080 > /dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  spark-worker:
    image: quay.io/jupyter/pyspark-notebook:spark-3.5.0
    container_name: taasim-spark-worker
    hostname: spark-worker
    networks:
      - taasim
    ports:
      - "8082:8082"   # Worker Web UI (8081 is taken by Flink)
    entrypoint: ["/usr/local/spark/bin/spark-class"]
    command:
      - org.apache.spark.deploy.worker.Worker
      - --cores
      - "2"
      - --memory
      - "2g"
      - --work-dir
      - /tmp/spark-work
      - --webui-port
      - "8082"
      - spark://spark-master:7077
    depends_on:
      spark-master:
        condition: service_healthy
      s3a-jars:
        condition: service_completed_successfully
    environment:
      SPARK_WORKER_CORES: "2"
      SPARK_WORKER_MEMORY: "2g"
      SPARK_WORKER_WEBUI_PORT: "8082"
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      PYSPARK_PYTHON: python3
    volumes:
      - ./conf/spark-defaults.conf:/usr/local/spark/conf/spark-defaults.conf:ro
      - s3a_jars:/opt/extra-jars:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8082 > /dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

# ---------------------------------------------------------------------------
# 5b. JUPYTER — PySpark notebooks (driver) connected to Spark master
# ---------------------------------------------------------------------------
  jupyter:
    image: quay.io/jupyter/pyspark-notebook:spark-3.5.0
    container_name: taasim-jupyter
    hostname: jupyter
    networks:
      - taasim
    ports:
      - "8888:8888"
    environment:
      SPARK_MASTER: spark://spark-master:7077
      PYSPARK_SUBMIT_ARGS: "--master spark://spark-master:7077 pyspark-shell"
      SPARK_CONF_DIR: /opt/spark-conf
      JUPYTER_TOKEN: taasim
    volumes:
      - ./notebooks/notebook-spark:/home/jovyan/work
      - ./conf/spark-defaults.conf:/opt/spark-conf/spark-defaults.conf:ro
      - s3a_jars:/opt/extra-jars:ro
    depends_on:
      spark-master:
        condition: service_healthy
      s3a-jars:
        condition: service_completed_successfully
      minio:
        condition: service_healthy

# ---------------------------------------------------------------------------
# 6. GRAFANA
# ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:10.4.2
    container_name: taasim-grafana
    hostname: grafana
    networks:
      - taasim
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: hadesarchitect-cassandra-datasource
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      cassandra:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health > /dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s