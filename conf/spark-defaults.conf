# =============================================================================
# TaaSim — Spark defaults for the Spark distribution bundled in:
#   quay.io/jupyter/pyspark-notebook:spark-3.5.0
#
# In this stack, this file is mounted into:
# - spark-master / spark-worker: /usr/local/spark/conf/spark-defaults.conf
# - jupyter (driver): /opt/spark-conf/spark-defaults.conf (SPARK_CONF_DIR)
# =============================================================================

# Extra JARs for S3A (downloaded by `s3a-jars` into the `s3a_jars` volume)
spark.jars                                          /opt/extra-jars/hadoop-aws-3.3.4.jar,/opt/extra-jars/aws-java-sdk-bundle-1.12.262.jar

# --- S3A / MinIO ---
spark.hadoop.fs.s3a.endpoint                        http://minio:9000
spark.hadoop.fs.s3a.path.style.access               true
spark.hadoop.fs.s3a.impl                            org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.aws.credentials.provider        com.amazonaws.auth.EnvironmentVariableCredentialsProvider
spark.hadoop.fs.s3a.connection.ssl.enabled          false

# --- General tuning ---
spark.sql.shuffle.partitions                        8
spark.default.parallelism                           8

# --- PySpark ---
# Keep Python interpreter consistent between driver (Jupyter) and executors (Spark workers)
spark.pyspark.python                                python3
spark.executorEnv.PYSPARK_PYTHON                    python3